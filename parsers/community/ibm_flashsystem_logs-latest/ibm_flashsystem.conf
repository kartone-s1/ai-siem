{
  // IBM FlashSystem (FS9500) → OCSF
  //
  // Source: BSD syslog (RFC 3164) from IBM FlashSystem over syslog-ng/rsyslog.
  // Frame: <PRI>Mmm DD HH:MM:SS hostname process[pid]: message
  //
  // Two process names emit events:
  //   sshd      → SSH daemon auth/session events → OCSF Authentication (3002)
  //   IBM4983   → FlashSystem audit trail       → OCSF API Activity    (6003)
  //
  // IBM4983 emits two line shapes:
  //   Audit:     IBM4983[pid]: # timestamp = ... # cluster_user = ... # action = ...
  //   Auth echo: IBM4983[pid]: Failed password for ... (duplicate, discarded)
  //
  // Timestamp note: BSD syslog carries no year; ts_raw is stashed in
  // unmapped.ts_raw. Ingest receive-time is used as event time.

  timezone: "UTC",

  attributes: {
    "metadata.version":             "1.0.0",
    "dataSource.category":          "security",
    "dataSource.name":              "IBM FlashSystem",
    "dataSource.vendor":            "IBM",
    "metadata.product.vendor_name": "IBM",
    "metadata.product.name":        "FlashSystem"
  },

  patterns: {
    syslogTs: "[A-Z][a-z]{2}\\s+\\d{1,2}\\s+\\d{2}:\\d{2}:\\d{2}"
  },

  formats: [

    // ── 1. IBM4983 AUDIT → OCSF API Activity (6003) ────────────────────────
    // Only audit lines have "# timestamp = " in the body; auth-echo lines
    // ("Failed password...") will not match this format.
    // The entire body after "# timestamp = " is captured into ibm_body.
    // Rewrites slice each " # key = value " field using:
    //   match:   "^.*# KEY = ([^ #]*(?: [^ #]+)*).*$"
    //   replace: "$1"
    // The anchor "^...$" makes replace:"$1" emit only the captured group.
    // The capture "[^ #]*(?: [^ #]+)*" handles values with internal spaces
    // bounded naturally by the " # " inter-field separator.
    {
      id: "ibmAudit",
      attributes: {
        "class_uid":     6003,
        "class_name":    "API Activity",
        "category_uid":  6,
        "category_name": "Application Activity",
        "severity_id":   1,
        "severity_name": "Informational"
      },
      format: "<$pri=digits$>$ts_raw=syslogTs$ $dst_endpoint.hostname$ IBM4983\\[$ibm_pid=digits$\\]: # timestamp = $ibm_body{regex=.+}$",
      rewrites: [
        { input: "ibm_body", output: "actor.user.name",      match: "^.*# cluster_user = ([^ #]*(?: [^ #]+)*).*$",    replace: "$1" },
        { input: "ibm_body", output: "src_endpoint.ip",      match: "^.*# ssh_ip_address = ([^ #]*(?: [^ #]+)*).*$",  replace: "$1" },
        { input: "ibm_body", output: "ibm_result",           match: "^.*# result = ([^ #]*(?: [^ #]+)*).*$",          replace: "$1" },
        { input: "ibm_body", output: "unmapped.res_obj_id",  match: "^.*# res_obj_id = ([^ #]*(?: [^ #]+)*).*$",      replace: "$1" },
        { input: "ibm_body", output: "api.service.name",     match: "^.*# command = ([^ #]*(?: [^ #]+)*).*$",         replace: "$1" },
        { input: "ibm_body", output: "api.operation",        match: "^.*# action = ([^ #]*(?: [^ #]+)*).*$",          replace: "$1" },
        { input: "ibm_body", output: "unmapped.action_cmd",  match: "^.*# action_cmd = ([^ #]*(?: [^ #]+)*).*$",      replace: "$1" },
        { input: "ibm_body", output: "unmapped.duration_ms", match: "^.*# duration_ms = ([^ #]*(?: [^ #]+)*).*$",     replace: "$1" }
      ],
      halt: true
    },

    // ── 2. IBM4983 auth-echo → DISCARD ─────────────────────────────────────
    { format: ".*IBM4983\\[", discard: true, halt: true },

    // ── 3. sshd: Failed password → Authentication Logon Failure ────────────
    {
      id: "sshd-failed-pw",
      attributes: {
        "class_uid":     3002,
        "class_name":    "Authentication",
        "category_uid":  3,
        "category_name": "Identity & Access Management",
        "activity_id":   1,
        "activity_name": "Logon",
        "status_id":     2,
        "status":        "Failure",
        "auth_protocol": "SSH",
        "logon_type_id": 3,
        "logon_type":    "Network",
        "is_remote":     true,
        "severity_id":   3,
        "severity_name": "High"
      },
      format: "<$pri=digits$>$ts_raw=syslogTs$ $dst_endpoint.hostname$ sshd\\[$sshd_pid=digits$\\]: Failed password for $user.name$ from $src_endpoint.ip$ port $src_endpoint.port=digits$ ssh2",
      halt: true
    },

    // ── 4. sshd: Accepted password → Authentication Logon Success ──────────
    {
      id: "sshd-accepted-pw",
      attributes: {
        "class_uid":     3002,
        "class_name":    "Authentication",
        "category_uid":  3,
        "category_name": "Identity & Access Management",
        "activity_id":   1,
        "activity_name": "Logon",
        "status_id":     1,
        "status":        "Success",
        "auth_protocol": "SSH",
        "logon_type_id": 3,
        "logon_type":    "Network",
        "is_remote":     true,
        "severity_id":   1,
        "severity_name": "Informational"
      },
      format: "<$pri=digits$>$ts_raw=syslogTs$ $dst_endpoint.hostname$ sshd\\[$sshd_pid=digits$\\]: Accepted password for $user.name$ from $src_endpoint.ip$ port $src_endpoint.port=digits$ ssh2",
      halt: true
    },

    // ── 5. sshd: Accepted publickey → Authentication Logon Success ─────────
    {
      id: "sshd-accepted-pk",
      attributes: {
        "class_uid":     3002,
        "class_name":    "Authentication",
        "category_uid":  3,
        "category_name": "Identity & Access Management",
        "activity_id":   1,
        "activity_name": "Logon",
        "status_id":     1,
        "status":        "Success",
        "auth_protocol": "SSH",
        "logon_type_id": 3,
        "logon_type":    "Network",
        "is_remote":     true,
        "severity_id":   1,
        "severity_name": "Informational"
      },
      format: "<$pri=digits$>$ts_raw=syslogTs$ $dst_endpoint.hostname$ sshd\\[$sshd_pid=digits$\\]: Accepted publickey for $user.name$ from $src_endpoint.ip$ port $src_endpoint.port=digits$ ssh2: $unmapped.ssh_key_type$ $unmapped.ssh_fingerprint{regex=\\S+}$",
      halt: true
    },

    // ── 6. sshd: pam_unix session opened → Authentication Logon ────────────
    // user.name regex [^(]+ stops before (uid=...) sub-string
    {
      id: "sshd-session-opened",
      attributes: {
        "class_uid":     3002,
        "class_name":    "Authentication",
        "category_uid":  3,
        "category_name": "Identity & Access Management",
        "activity_id":   1,
        "activity_name": "Logon",
        "status_id":     1,
        "status":        "Success",
        "auth_protocol": "SSH",
        "logon_type_id": 3,
        "logon_type":    "Network",
        "is_remote":     true,
        "severity_id":   1,
        "severity_name": "Informational"
      },
      format: "<$pri=digits$>$ts_raw=syslogTs$ $dst_endpoint.hostname$ sshd\\[$sshd_pid=digits$\\]: pam_unix\\(sshd:session\\): session opened for user $user.name{regex=[^(]+}$\\(uid=$user.uid=digits$\\) by $unmapped.session_opened_by{regex=[^(]+}$\\(uid=$unmapped.opened_by_uid=digits$\\)",
      halt: true
    },

    // ── 7. sshd: pam_unix session closed → Authentication Logoff ───────────
    {
      id: "sshd-session-closed",
      attributes: {
        "class_uid":     3002,
        "class_name":    "Authentication",
        "category_uid":  3,
        "category_name": "Identity & Access Management",
        "activity_id":   2,
        "activity_name": "Logoff",
        "status_id":     1,
        "status":        "Success",
        "auth_protocol": "SSH",
        "severity_id":   1,
        "severity_name": "Informational"
      },
      format: "<$pri=digits$>$ts_raw=syslogTs$ $dst_endpoint.hostname$ sshd\\[$sshd_pid=digits$\\]: pam_unix\\(sshd:session\\): session closed for user $user.name$",
      halt: true
    },

    // ── 8. sshd: Disconnected from authenticating user [preauth] → Logon Failure
    {
      id: "sshd-disconnected-preauth",
      attributes: {
        "class_uid":     3002,
        "class_name":    "Authentication",
        "category_uid":  3,
        "category_name": "Identity & Access Management",
        "activity_id":   1,
        "activity_name": "Logon",
        "status_id":     2,
        "status":        "Failure",
        "auth_protocol": "SSH",
        "logon_type_id": 3,
        "logon_type":    "Network",
        "is_remote":     true,
        "severity_id":   3,
        "severity_name": "High"
      },
      format: "<$pri=digits$>$ts_raw=syslogTs$ $dst_endpoint.hostname$ sshd\\[$sshd_pid=digits$\\]: Disconnected from authenticating user $user.name$ $src_endpoint.ip$ port $src_endpoint.port=digits$ \\[preauth\\]",
      halt: true
    },

    // ── 9. sshd: Disconnected from user → Authentication Logoff ────────────
    {
      id: "sshd-disconnected",
      attributes: {
        "class_uid":     3002,
        "class_name":    "Authentication",
        "category_uid":  3,
        "category_name": "Identity & Access Management",
        "activity_id":   2,
        "activity_name": "Logoff",
        "status_id":     1,
        "status":        "Success",
        "auth_protocol": "SSH",
        "severity_id":   1,
        "severity_name": "Informational"
      },
      format: "<$pri=digits$>$ts_raw=syslogTs$ $dst_endpoint.hostname$ sshd\\[$sshd_pid=digits$\\]: Disconnected from user $user.name$ $src_endpoint.ip$ port $src_endpoint.port=digits$",
      halt: true
    },

    // ── 10. Catch-all: discard low-signal sshd noise ────────────────────────
    { format: ".*", discard: true, halt: true }
  ],

  mappings: {
    version: 1,
    mappings: [
      {
        predicate: "true",
        transformations: [
          // Stash raw syslog timestamp; do not parse into event time (no year in BSD syslog).
          { copy: { from: "ts_raw", to: "unmapped.ts_raw" } },
          { drop: { field: "ts_raw" } },

          // IBM4983 audit: derive status from ibm_result
          { constant: { value: 1,         field: "status_id", predicate: "ibm_result == 'success'" } },
          { constant: { value: "Success", field: "status",    predicate: "ibm_result == 'success'" } },
          { constant: { value: 2,         field: "status_id", predicate: "ibm_result == 'failure'" } },
          { constant: { value: "Failure", field: "status",    predicate: "ibm_result == 'failure'" } },
          { constant: { value: 2,         field: "status_id", predicate: "ibm_result == 'failed'" } },
          { constant: { value: "Failure", field: "status",    predicate: "ibm_result == 'failed'" } },

          // IBM4983 audit: cast duration to int
          { cast: { field: "unmapped.duration_ms", type: "int" } },

          // Common cleanup
          { drop: { field: "ibm_result" } },
          { drop: { field: "ibm_body" } },
          { drop: { field: "pri" } },
          { drop: { field: "ibm_pid" } },
          { drop: { field: "sshd_pid" } },

          // Drop format-id sentinels
          { drop: { field: "ibmAudit" } },
          { drop: { field: "sshd-failed-pw" } },
          { drop: { field: "sshd-accepted-pw" } },
          { drop: { field: "sshd-accepted-pk" } },
          { drop: { field: "sshd-session-opened" } },
          { drop: { field: "sshd-session-closed" } },
          { drop: { field: "sshd-disconnected-preauth" } },
          { drop: { field: "sshd-disconnected" } }
        ]
      }
    ]
  },

  discardAttributes: ["message"]
}
