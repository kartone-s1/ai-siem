// =====================================================================
// Delinea (Thycotic) Secret Server  —  CEF over syslog  →  OCSF
//
// Target line shape (classic-syslog frame, NO <PRI> in the samples but
// supported optionally):
//
//   Feb 20 02:56:57 srv-host CEF:0|Thycotic Software|Secret Server|11.10.000000|10004|SECRET - VIEW|2|msg=[[SecretServer]] Event: [Secret] Action: [View] By User: dom\user Item name: NAME (Item Id: 123) Container name: FOLDER  suid=1 suser=dom\user duser=dom\user duid=4 src=10.0.0.1 rt=Feb 20 2026 10:20:24 ...
//
// One parser, three OCSF classes (routed per CEF signature id):
//   USER - LOGIN (16) / LOGINFAILURE (18)         -> Authentication   3002
//   USER - DISABLE (2) / ENABLE (3) / EDIT (10100) -> Account Change   3001
//   SECRET - VIEW (10004) / LAUNCH (10006) /
//            PASSWORDCHANGE (10055) /
//            PASSWORDCHANGEFAILURE (10155) /
//            HEARTBEATSUCCESS (10032)             -> API Activity      6003
//   (SECRET = PAM credential-access; modelled as an operation on a
//    `resources[]` entry — the secret — per the user's chosen mapping.)
//
// Why the rewrites-on-`extension` idiom (see catalog example 11):
//   The CEF extension mixes a long free-text `msg=` (with spaces,
//   brackets, "Item name:" / "By User:" sub-tokens) with trailing CEF
//   k=v pairs whose VALUES contain spaces (`cs4=dom\user Display`,
//   `rt=Feb 20 2026 10:20:24`) and whose ORDER varies by event type.
//   A whitespace-delimited k=v catch-all truncates those. So we bundle
//   the whole body into `extension` and slice each field out with an
//   independent Java-regex rewrite (failures degrade to no-ops).
//
// Reserved-field safety (per catalog gotchas + examples 09/10):
//   - never write `timestamp`/`time` from a string  -> keep raw stamp,
//     map device receipt-time to `metadata.original_time` (a String).
//   - never write `host`                            -> use `device.hostname`.
//   - never write `severity` directly               -> emit `severity_id`
//     (int) + `severity_name` (string).
//
// Timezone: classic-syslog stamps carry no zone -> set at parser level.
// =====================================================================
{
  timezone: "UTC",

  attributes: {
    // ---- 4 mandatory pipeline defaults ----
    "metadata.version":    "1.0.0",
    "dataSource.category": "security",
    "dataSource.name":     "Secret Server",
    "dataSource.vendor":   "Delinea",

    // ---- product / provider metadata ----
    "metadata.product.vendor_name": "Delinea",
    "metadata.product.name":        "Secret Server",
    "metadata.log_provider":        "Secret Server"
    // class_uid / category_uid are per-event and set in `mappings`.
  },

  patterns: {
    // Optional RFC3164 priority "<134>" (absent in the samples).
    priOpt:   "(?:<\\d+>)?",
    // Classic-syslog timestamp "Feb 20 02:56:57" (1-2 spaces before day).
    syslogTs: "[A-Z][a-z]{2}\\s+\\d{1,2}\\s+\\d{2}:\\d{2}:\\d{2}",
    // CEF pipe-delimited header field: anything that isn't a pipe
    // (CEF `name`/`vendor` carry spaces, so the default whitespace-stop
    // capture would fail).
    notPipe:  "[^|]*"
  },

  formats: [
    {
      // Frame: syslog wrapper + 7 positional CEF header fields, then the
      // whole extension into `extension`. NO halt — but there is only one
      // format, and all field slicing happens in `rewrites` below.
      id: "thycotic_cef",
      // NOTE: `$extension$` is BARE (no pattern) on purpose — the final field
      // in a format captures the remainder of the line to EOL (spaces and all).
      // Giving it an explicit `.*` pattern (`$extension=rest$`) instead caused
      // the body to NOT capture, leaving every extension-rewrite empty.
      format: "$pri=priOpt$$ts_raw=syslogTs$ $device.hostname$ CEF:$cef_version=notPipe$\\|$cef_vendor=notPipe$\\|$cef_product=notPipe$\\|$cef_product_version=notPipe$\\|$signature_id=notPipe$\\|$name=notPipe$\\|$cef_severity=notPipe$\\|$extension$",

      // CRITICAL: every rewrite sets `outputIfNoMatch: false`. On this tenant
      // the DEFAULT is true, which — when the regex does not match — writes the
      // INPUT (`extension`) verbatim into the output field. Without this flag,
      // events missing a field (e.g. api.operation on a LOGIN, src on a VIEW)
      // get the entire raw body dumped into the target. With it, a non-match is
      // a clean no-op and the field stays unset.
      rewrites: [
        // ---- Coarse event-class hint, derived from the CEF `name` ----
        // ("SECRET - …" / "USER - LOGIN…" / "USER - EDIT|DISABLE|ENABLE").
        // Mutually exclusive; drives the class/category constants below.
        { input: "name", output: "ss_kind", match: "^(?i)secret.*$",                         replace: "api",     outputIfNoMatch: false },
        { input: "name", output: "ss_kind", match: "^(?i)user - login.*$",                   replace: "auth",    outputIfNoMatch: false },
        { input: "name", output: "ss_kind", match: "^(?i)user - (?:edit|disable|enable).*$", replace: "account", outputIfNoMatch: false },

        // ---- Actor (the operator who performed the action) -----------
        // "By User: dom\user" — single token (no space) after the label.
        { input: "extension", output: "actor.user.name",   match: "^.*By User: (\\S+).*$",            replace: "$1", outputIfNoMatch: false },
        // Domain half of "dom\user" (no-op when the principal has no domain, e.g. ThycoticSystem).
        { input: "extension", output: "actor.user.domain", match: "^.*By User: ([^\\\\ ]+)\\\\.*$",    replace: "$1", outputIfNoMatch: false },
        // suid = operator's internal user id.
        { input: "extension", output: "actor.user.uid",    match: "^.*\\bsuid=([^ ]+).*$",            replace: "$1", outputIfNoMatch: false },

        // ---- Target account (USER events: duser/duid) ----------------
        // Account Change: the account that was modified. Authentication:
        // the authenticating subject (== actor). Absent on SECRET events.
        { input: "extension", output: "user.name",   match: "^.*\\bduser=([^ ]+).*$",        replace: "$1", outputIfNoMatch: false },
        { input: "extension", output: "user.domain", match: "^.*\\bduser=([^\\\\ ]+)\\\\.*$", replace: "$1", outputIfNoMatch: false },
        { input: "extension", output: "user.uid",    match: "^.*\\bduid=([^ ]+).*$",         replace: "$1", outputIfNoMatch: false },

        // ---- Source / destination endpoints --------------------------
        // src = client IP (login/launch). Target Server = the host a
        // launched secret connects to (SECRET - LAUNCH only).
        { input: "extension", output: "src_endpoint.ip",       match: "^.*\\bsrc=([^ ]+).*$",          replace: "$1", outputIfNoMatch: false },
        { input: "extension", output: "dst_endpoint.hostname", match: "^.*Target Server: (\\S+).*$",   replace: "$1", outputIfNoMatch: false },

        // ---- Original event time (CEF `rt`, values contain spaces) ---
        // Bounded by the next known key or EOL. Kept as a String in
        // metadata.original_time (never written to reserved `time`).
        { input: "extension", output: "metadata.original_time",
          match: "^.*\\brt=(.+?)(?=\\s+(?:fname|fileType|fileId|cs3Label|cs3|cs4Label|cs4|suid|suser|duser|duid|src)=|$).*$",
          replace: "$1", outputIfNoMatch: false },

        // ---- SECRET-only fields (gated by requiring "Event: [Secret]"
        //      in the regex, so USER/auth events never match) ----------
        // resources[0].name = the secret's display name.
        { input: "extension", output: "resources[0].name",
          match: "(?i)^.*event: \\[(?:language resource not found: )?secret\\].*?item name: (.+?)(?: \\(item id:| container name:| details:|$).*$",
          replace: "$1", outputIfNoMatch: false },
        // resources[0].uid = the secret's Item Id (absent on HEARTBEAT).
        { input: "extension", output: "resources[0].uid",
          match: "(?i)^.*event: \\[(?:language resource not found: )?secret\\].*?\\(item id: ([^)]+)\\).*$",
          replace: "$1", outputIfNoMatch: false },
        // api.operation = the vendor action verb (View/Launch/Password change/…).
        { input: "extension", output: "api.operation",
          match: "(?i)^.*event: \\[(?:language resource not found: )?secret\\].*?action: \\[(?:language resource not found: )?([^\\]]+)\\].*$",
          replace: "$1", outputIfNoMatch: false },

        // ---- Remaining CEF extension k=v fields (kept vendor-native) -----
        // Values may contain single internal spaces, so each is bounded by the
        // next known key or EOL (same multi-space-safe idiom as the others).
        // cs4 = actor display name; cs4Label = its CEF label ("suser Display Name").
        { input: "extension", output: "cs4",
          match: "^.*\\bcs4=(.+?)(?=\\s+(?:suid|suser|cs4Label|cs3Label|cs3|duser|duid|fname|fileType|fileId|src|rt)=|$).*$",
          replace: "$1", outputIfNoMatch: false },
        { input: "extension", output: "cs4Label",
          match: "^.*\\bcs4Label=(.+?)(?=\\s+(?:suid|suser|cs4|cs3Label|cs3|duser|duid|fname|fileType|fileId|src|rt)=|$).*$",
          replace: "$1", outputIfNoMatch: false },
        // cs3 = folder/container name; cs3Label = its CEF label ("Folder").
        { input: "extension", output: "cs3",
          match: "^.*\\bcs3=(.+?)(?=\\s+(?:suid|suser|cs4Label|cs4|cs3Label|duser|duid|fname|fileType|fileId|src|rt)=|$).*$",
          replace: "$1", outputIfNoMatch: false },
        { input: "extension", output: "cs3Label",
          match: "^.*\\bcs3Label=(.+?)(?=\\s+(?:suid|suser|cs4Label|cs4|cs3|duser|duid|fname|fileType|fileId|src|rt)=|$).*$",
          replace: "$1", outputIfNoMatch: false },
        // fname = item full name; fileType = User|Secret; fileId = item id.
        { input: "extension", output: "fname",
          match: "^.*\\bfname=(.+?)(?=\\s+(?:suid|suser|cs4Label|cs4|cs3Label|cs3|duser|duid|fileType|fileId|src|rt)=|$).*$",
          replace: "$1", outputIfNoMatch: false },
        { input: "extension", output: "fileType", match: "^.*\\bfileType=([^ ]+).*$", replace: "$1", outputIfNoMatch: false },
        { input: "extension", output: "fileId",   match: "^.*\\bfileId=([^ ]+).*$",   replace: "$1", outputIfNoMatch: false },

        // ---- msg free-text sub-fields ----
        // Container name + id (the folder the secret/account lives in).
        { input: "extension", output: "container_name",
          match: "^.*Container name: (.+?)(?: \\(Container Id:| Details:| suid=|$).*$",
          replace: "$1", outputIfNoMatch: false },
        { input: "extension", output: "container_id",
          match: "^.*\\(Container Id: ([^)]+)\\).*$",
          replace: "$1", outputIfNoMatch: false },
        // Details free-text -> OCSF status_detail (failure reason on LOGINFAILURE,
        // change description on USER edits, RDP/connection info on LAUNCH).
        { input: "extension", output: "status_detail",
          match: "^.*Details:\\s*(.+?)(?=\\s+suid=|$).*$",
          replace: "$1", outputIfNoMatch: false }
      ]
    }
  ],

  mappings: {
    version: 1,
    mappings: [
      {
        predicate: "true",
        transformations: [
          // ---- Preserve the vendor event code ----
          { rename: { from: "name", to: "metadata.event_code" } },

          // =====================================================
          //  CLASS / CATEGORY  (coarse, by ss_kind)
          // =====================================================
          // -- API Activity (6003): SECRET credential-access --
          { constant: { value: 6003,              field: "class_uid",        predicate: "ss_kind == 'api'" } },
          { constant: { value: "API Activity",    field: "class_name",       predicate: "ss_kind == 'api'" } },
          { constant: { value: 6,                 field: "category_uid",     predicate: "ss_kind == 'api'" } },
          { constant: { value: "Application Activity", field: "category_name", predicate: "ss_kind == 'api'" } },
          { constant: { value: "Secret Server",   field: "api.service.name", predicate: "ss_kind == 'api'" } },
          { constant: { value: "Secret",          field: "resources[0].type", predicate: "ss_kind == 'api'" } },

          // -- Authentication (3002): USER LOGIN / LOGINFAILURE --
          { constant: { value: 3002,           field: "class_uid",     predicate: "ss_kind == 'auth'" } },
          { constant: { value: "Authentication", field: "class_name",  predicate: "ss_kind == 'auth'" } },
          { constant: { value: 3,              field: "category_uid",  predicate: "ss_kind == 'auth'" } },
          { constant: { value: "Identity & Access Management", field: "category_name", predicate: "ss_kind == 'auth'" } },

          // -- Account Change (3001): USER ENABLE / DISABLE / EDIT --
          { constant: { value: 3001,            field: "class_uid",    predicate: "ss_kind == 'account'" } },
          { constant: { value: "Account Change", field: "class_name",  predicate: "ss_kind == 'account'" } },
          { constant: { value: 3,               field: "category_uid", predicate: "ss_kind == 'account'" } },
          { constant: { value: "Identity & Access Management", field: "category_name", predicate: "ss_kind == 'account'" } },

          // =====================================================
          //  ACTIVITY / STATUS / TYPE_UID / SEVERITY  (per signature)
          //  type_uid = class_uid*100 + activity_id
          //  status_id: 1 Success, 2 Failure   severity_id: 1 Info, 3 Medium
          // =====================================================
          // -- 16  USER - LOGIN  -> Logon / Success --
          { constant: { value: 1,        field: "activity_id",   predicate: "signature_id == '16'" } },
          { constant: { value: "Logon",  field: "activity_name", predicate: "signature_id == '16'" } },
          { constant: { value: 1,        field: "status_id",     predicate: "signature_id == '16'" } },
          { constant: { value: "Success", field: "status",       predicate: "signature_id == '16'" } },
          { constant: { value: 300201,   field: "type_uid",      predicate: "signature_id == '16'" } },
          { constant: { value: 1,        field: "severity_id",   predicate: "signature_id == '16'" } },
          { constant: { value: "Informational", field: "severity_name", predicate: "signature_id == '16'" } },

          // -- 18  USER - LOGINFAILURE  -> Logon / Failure --
          { constant: { value: 1,        field: "activity_id",   predicate: "signature_id == '18'" } },
          { constant: { value: "Logon",  field: "activity_name", predicate: "signature_id == '18'" } },
          { constant: { value: 2,        field: "status_id",     predicate: "signature_id == '18'" } },
          { constant: { value: "Failure", field: "status",       predicate: "signature_id == '18'" } },
          { constant: { value: 300201,   field: "type_uid",      predicate: "signature_id == '18'" } },
          { constant: { value: 3,        field: "severity_id",   predicate: "signature_id == '18'" } },
          { constant: { value: "Medium", field: "severity_name", predicate: "signature_id == '18'" } },

          // -- 2  USER - DISABLE  -> Disable / Success --
          { constant: { value: 5,        field: "activity_id",   predicate: "signature_id == '2'" } },
          { constant: { value: "Disable", field: "activity_name", predicate: "signature_id == '2'" } },
          { constant: { value: 1,        field: "status_id",     predicate: "signature_id == '2'" } },
          { constant: { value: "Success", field: "status",       predicate: "signature_id == '2'" } },
          { constant: { value: 300105,   field: "type_uid",      predicate: "signature_id == '2'" } },
          { constant: { value: 1,        field: "severity_id",   predicate: "signature_id == '2'" } },
          { constant: { value: "Informational", field: "severity_name", predicate: "signature_id == '2'" } },

          // -- 3  USER - ENABLE  -> Enable / Success --
          { constant: { value: 2,        field: "activity_id",   predicate: "signature_id == '3'" } },
          { constant: { value: "Enable", field: "activity_name", predicate: "signature_id == '3'" } },
          { constant: { value: 1,        field: "status_id",     predicate: "signature_id == '3'" } },
          { constant: { value: "Success", field: "status",       predicate: "signature_id == '3'" } },
          { constant: { value: 300102,   field: "type_uid",      predicate: "signature_id == '3'" } },
          { constant: { value: 1,        field: "severity_id",   predicate: "signature_id == '3'" } },
          { constant: { value: "Informational", field: "severity_name", predicate: "signature_id == '3'" } },

          // -- 10100  USER - EDIT  -> Other ("Edit") / Success --
          { constant: { value: 99,       field: "activity_id",   predicate: "signature_id == '10100'" } },
          { constant: { value: "Other",  field: "activity_name", predicate: "signature_id == '10100'" } },
          { constant: { value: 1,        field: "status_id",     predicate: "signature_id == '10100'" } },
          { constant: { value: "Success", field: "status",       predicate: "signature_id == '10100'" } },
          { constant: { value: 300199,   field: "type_uid",      predicate: "signature_id == '10100'" } },
          { constant: { value: 1,        field: "severity_id",   predicate: "signature_id == '10100'" } },
          { constant: { value: "Informational", field: "severity_name", predicate: "signature_id == '10100'" } },

          // -- 10004  SECRET - VIEW  -> Read / Success --
          { constant: { value: 2,        field: "activity_id",   predicate: "signature_id == '10004'" } },
          { constant: { value: "Read",   field: "activity_name", predicate: "signature_id == '10004'" } },
          { constant: { value: 1,        field: "status_id",     predicate: "signature_id == '10004'" } },
          { constant: { value: "Success", field: "status",       predicate: "signature_id == '10004'" } },
          { constant: { value: 600302,   field: "type_uid",      predicate: "signature_id == '10004'" } },
          { constant: { value: 1,        field: "severity_id",   predicate: "signature_id == '10004'" } },
          { constant: { value: "Informational", field: "severity_name", predicate: "signature_id == '10004'" } },

          // -- 10006  SECRET - LAUNCH  -> Read / Success --
          { constant: { value: 2,        field: "activity_id",   predicate: "signature_id == '10006'" } },
          { constant: { value: "Read",   field: "activity_name", predicate: "signature_id == '10006'" } },
          { constant: { value: 1,        field: "status_id",     predicate: "signature_id == '10006'" } },
          { constant: { value: "Success", field: "status",       predicate: "signature_id == '10006'" } },
          { constant: { value: 600302,   field: "type_uid",      predicate: "signature_id == '10006'" } },
          { constant: { value: 1,        field: "severity_id",   predicate: "signature_id == '10006'" } },
          { constant: { value: "Informational", field: "severity_name", predicate: "signature_id == '10006'" } },

          // -- 10055  SECRET - PASSWORDCHANGE  -> Update / Success --
          { constant: { value: 3,        field: "activity_id",   predicate: "signature_id == '10055'" } },
          { constant: { value: "Update", field: "activity_name", predicate: "signature_id == '10055'" } },
          { constant: { value: 1,        field: "status_id",     predicate: "signature_id == '10055'" } },
          { constant: { value: "Success", field: "status",       predicate: "signature_id == '10055'" } },
          { constant: { value: 600303,   field: "type_uid",      predicate: "signature_id == '10055'" } },
          { constant: { value: 1,        field: "severity_id",   predicate: "signature_id == '10055'" } },
          { constant: { value: "Informational", field: "severity_name", predicate: "signature_id == '10055'" } },

          // -- 10155  SECRET - PASSWORDCHANGEFAILURE  -> Update / Failure --
          { constant: { value: 3,        field: "activity_id",   predicate: "signature_id == '10155'" } },
          { constant: { value: "Update", field: "activity_name", predicate: "signature_id == '10155'" } },
          { constant: { value: 2,        field: "status_id",     predicate: "signature_id == '10155'" } },
          { constant: { value: "Failure", field: "status",       predicate: "signature_id == '10155'" } },
          { constant: { value: 600303,   field: "type_uid",      predicate: "signature_id == '10155'" } },
          { constant: { value: 3,        field: "severity_id",   predicate: "signature_id == '10155'" } },
          { constant: { value: "Medium", field: "severity_name", predicate: "signature_id == '10155'" } },

          // -- 10032  SECRET - HEARTBEATSUCCESS  -> Other / Success --
          { constant: { value: 99,       field: "activity_id",   predicate: "signature_id == '10032'" } },
          { constant: { value: "Other",  field: "activity_name", predicate: "signature_id == '10032'" } },
          { constant: { value: 1,        field: "status_id",     predicate: "signature_id == '10032'" } },
          { constant: { value: "Success", field: "status",       predicate: "signature_id == '10032'" } },
          { constant: { value: 600399,   field: "type_uid",      predicate: "signature_id == '10032'" } },
          { constant: { value: 1,        field: "severity_id",   predicate: "signature_id == '10032'" } },
          { constant: { value: "Informational", field: "severity_name", predicate: "signature_id == '10032'" } },

          // ---- User object type (POSIX/AD user) ----
          { constant: { value: 1,      field: "actor.user.type_id", predicate: "true" } },
          { constant: { value: "User", field: "actor.user.type",    predicate: "true" } }

          // NOTE: nothing is dropped. All source data is retained — the raw
          // `message`, every CEF header component (cef_*, signature_id, pri,
          // ts_raw), the bulk `extension`, the parse-routing field `ss_kind`,
          // and every key=value / free-text sub-field captured by the rewrites
          // above. Fields with a clean OCSF home are mapped there; the rest are
          // kept vendor-native and queryable.
        ]
      }
    ]
  },

  // Retain the raw event line in full.
  discardAttributes: []
}
