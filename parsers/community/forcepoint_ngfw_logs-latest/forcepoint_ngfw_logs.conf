// Forcepoint NGFW (Stonesoft) firewall connection logs over LEEF 1.0 / syslog.
//

{
  timezone: "UTC",

  attributes: {
    // Mandatory pipeline defaults.
    "metadata.version":    "1.3.0",
    "dataSource.category": "security",
    "dataSource.name":     "Forcepoint NGFW",
    "dataSource.vendor":   "Forcepoint",
    // Vendor / product metadata.
    "metadata.product.vendor_name": "Forcepoint",
    "metadata.product.name":        "NGFW",
    "metadata.log_provider":        "leef",
    "class_uid":     4001,
    "class_name":    "Network Activity",
    "category_uid":  4,
    "category_name": "Network Activity"
  },

  patterns: {
    // Anything-but-pipe — used for the LEEF positional header fields. The
    // header `name`-style fields can contain spaces and other non-pipe chars,
    // so the default `quotable` capture (which stops at whitespace) is wrong.
    notPipe: "[^|]*",
    // Anything-but-tab — used as the value pattern in the K/V catch-all so
    // values with single internal spaces survive.
    notTab:  "[^\\t]*"
  },

  formats: [
    // Per-event-code frame formats. Each one anchors on the literal event
    // code (LEEF header field 5) in its `format` string and stamps
    // `metadata.event_code` + `activity_id` + `activity_name` + (where
    // applicable) `disposition` / `disposition_id` / `status` / `status_id`
    // via the format's `attributes:` block. This is the canonical pattern
    // for conditional class assignment per the mappers reference (the
    // mapping-predicate fan-out doesn't fire when the field referenced in
    // the predicate is itself populated by a mapping op).
    //
    // No `halt: true` on these frames — the K/V catch-all below must still
    // run to populate src/dst/etc.

    // Connection_Allowed → Open / Allowed
    {
      id: "frame-allowed",
      format: "<$pri{regex=\\d+}$>LEEF:$leef_version=notPipe$\\|$leef_vendor=notPipe$\\|$leef_product=notPipe$\\|$product_version=notPipe$\\|Connection_Allowed\\|$leef_body$",
      attributes: {
        "metadata.event_code": "Connection_Allowed",
        "activity_id":         1,
        "activity_name":       "Open",
        "disposition_id":      1,
        "disposition":         "Allowed"
      }
    },

    // Connection_Closed → Close
    {
      id: "frame-closed",
      format: "<$pri{regex=\\d+}$>LEEF:$leef_version=notPipe$\\|$leef_vendor=notPipe$\\|$leef_product=notPipe$\\|$product_version=notPipe$\\|Connection_Closed\\|$leef_body$",
      attributes: {
        "metadata.event_code": "Connection_Closed",
        "activity_id":         2,
        "activity_name":       "Close"
      }
    },

    // Connection_Closed-Abnormally → Close + Failure
    {
      id: "frame-closed-abn",
      format: "<$pri{regex=\\d+}$>LEEF:$leef_version=notPipe$\\|$leef_vendor=notPipe$\\|$leef_product=notPipe$\\|$product_version=notPipe$\\|Connection_Closed-Abnormally\\|$leef_body$",
      attributes: {
        "metadata.event_code": "Connection_Closed-Abnormally",
        "activity_id":         2,
        "activity_name":       "Close",
        "status_id":           2,
        "status":              "Failure"
      }
    },

    // Connection_Discarded → Refuse / Blocked
    {
      id: "frame-discarded",
      format: "<$pri{regex=\\d+}$>LEEF:$leef_version=notPipe$\\|$leef_vendor=notPipe$\\|$leef_product=notPipe$\\|$product_version=notPipe$\\|Connection_Discarded\\|$leef_body$",
      attributes: {
        "metadata.event_code": "Connection_Discarded",
        "activity_id":         5,
        "activity_name":       "Refuse",
        "disposition_id":      2,
        "disposition":         "Blocked"
      }
    },

    // HTTP_URL-Logged → Traffic / Allowed
    {
      id: "frame-http-url",
      format: "<$pri{regex=\\d+}$>LEEF:$leef_version=notPipe$\\|$leef_vendor=notPipe$\\|$leef_product=notPipe$\\|$product_version=notPipe$\\|HTTP_URL-Logged\\|$leef_body$",
      attributes: {
        "metadata.event_code": "HTTP_URL-Logged",
        "activity_id":         6,
        "activity_name":       "Traffic",
        "disposition_id":      1,
        "disposition":         "Allowed"
      }
    },

    // ────────────────────────────────────────────────────────────────────────
    // Authentication-class frames (OCSF 3002 Authentication, category 3 IAM).
    //
    // These event types are NOT firewall traffic — they're SSH / captive-portal /
    // mgmt-UI login events. They override the parser-root Network Activity (4001)
    // class metadata via the format's `attributes:` block (per-format attrs
    // beat parser-root attrs).
    //
    // OCSF Authentication activity_ids: 1 = Logon, 2 = Logoff. All login attempts
    // (success or failure) are activity_id=1; success/failure differentiation
    // uses status_id (1 = Success, 2 = Failure).
    //
    // type_uid = class_uid * 100 + activity_id = 300201 for all four.
    //
    // Note: the `Management Server: Login failed` event_code contains spaces and
    // a colon; the format engine treats spaces as `\s+` so the literal still
    // matches the actual on-the-wire value. This frame also handles the "Alert"
    // product variant and `version=unknown` because the `notPipe` matcher on
    // the prior LEEF header positions captures any pipe-bounded string.
    // ────────────────────────────────────────────────────────────────────────

    // System_Engine-LOGIN_Failed → Logon attempt (Failure)
    {
      id: "frame-engine-login-failed",
      format: "<$pri{regex=\\d+}$>LEEF:$leef_version=notPipe$\\|$leef_vendor=notPipe$\\|$leef_product=notPipe$\\|$product_version=notPipe$\\|System_Engine-LOGIN_Failed\\|$leef_body$",
      attributes: {
        "metadata.event_code": "System_Engine-LOGIN_Failed",
        "class_uid":     3002,
        "class_name":    "Authentication",
        "category_uid":  3,
        "category_name": "Identity & Access Management",
        "activity_id":   1,
        "activity_name": "Logon",
        "status_id":     2,
        "status":        "Failure",
        "type_uid":      300201
      }
    },

    // System_Engine-LOGIN_Event → Logon (Success). Forcepoint emits this for
    // successful sshd session opens; the username typically appears inside
    // `msg` (which we already capture as `status_detail`).
    {
      id: "frame-engine-login-event",
      format: "<$pri{regex=\\d+}$>LEEF:$leef_version=notPipe$\\|$leef_vendor=notPipe$\\|$leef_product=notPipe$\\|$product_version=notPipe$\\|System_Engine-LOGIN_Event\\|$leef_body$",
      attributes: {
        "metadata.event_code": "System_Engine-LOGIN_Event",
        "class_uid":     3002,
        "class_name":    "Authentication",
        "category_uid":  3,
        "category_name": "Identity & Access Management",
        "activity_id":   1,
        "activity_name": "Logon",
        "status_id":     1,
        "status":        "Success",
        "type_uid":      300201
      }
    },

    // FW_BBA-User-login-failed → captive-portal user login Failure. Has src/
    // dst/srcPort/dstPort plus usrName, so actor.user.name lands cleanly via
    // the K/V catch-all.
    {
      id: "frame-bba-login-failed",
      format: "<$pri{regex=\\d+}$>LEEF:$leef_version=notPipe$\\|$leef_vendor=notPipe$\\|$leef_product=notPipe$\\|$product_version=notPipe$\\|FW_BBA-User-login-failed\\|$leef_body$",
      attributes: {
        "metadata.event_code": "FW_BBA-User-login-failed",
        "class_uid":     3002,
        "class_name":    "Authentication",
        "category_uid":  3,
        "category_name": "Identity & Access Management",
        "activity_id":   1,
        "activity_name": "Logon",
        "status_id":     2,
        "status":        "Failure",
        "type_uid":      300201
      }
    },

    // "Management Server: Login failed" → mgmt UI login Failure. Distinct
    // shape: `product=Alert`, `version=unknown`, `sender=Management Server`,
    // and there is no `devTime` field (timestamp falls back to receive-time).
    // Username and source IP are embedded inside `msg` and surface via
    // `status_detail` rather than `actor.user.name` / `src_endpoint.ip`.
    {
      id: "frame-mgmt-login-failed",
      format: "<$pri{regex=\\d+}$>LEEF:$leef_version=notPipe$\\|$leef_vendor=notPipe$\\|$leef_product=notPipe$\\|$product_version=notPipe$\\|Management Server: Login failed\\|$leef_body$",
      attributes: {
        "metadata.event_code": "Management Server: Login failed",
        "class_uid":     3002,
        "class_name":    "Authentication",
        "category_uid":  3,
        "category_name": "Identity & Access Management",
        "activity_id":   1,
        "activity_name": "Logon",
        "status_id":     2,
        "status":        "Failure",
        "type_uid":      300201
      }
    },

    // Fallback frame for any other event code (URL_Category-*, FW_Info-Request,
    // FW_New-IPsec-VPN-Connection, FW_Related-Connection, FW_DHCP-*, etc.).
    // Captures event_code dynamically; mappings below promote it to
    // metadata.event_code. No activity_id stamped here — those events ingest
    // cleanly without a class-activity tag.
    //
    // For events that DO match one of the per-code frames above, this
    // fallback ALSO matches and captures `event_code` as a duplicate field.
    // Mappings drop the duplicate explicitly.
    {
      id: "frame-fallback",
      format: "<$pri{regex=\\d+}$>LEEF:$leef_version=notPipe$\\|$leef_vendor=notPipe$\\|$leef_product=notPipe$\\|$product_version=notPipe$\\|$event_code=notPipe$\\|$leef_body$"
    },

    // Format 2: K/V catch-all. Re-applies (`repeat: true`) until no more
    // `<identifier>=<value-up-to-tab>` pairs are found. Leading `.*` lets
    // each iteration skip past whatever was already consumed.
    {
      id: "leef-kv",
      format: ".*$_=identifier$=$_=notTab$",
      repeat: true
    },

    // Format 3: capture `devTime` as the event time. Forcepoint emits the
    // event time as a `MMM dd yyyy HH:mm:ss` string (the format is declared
    // by the leading `devTimeFormat=MMM dd yyyy HH:mm:ss` LEEF directive).
    // We anchor on `\tdevTime=`, then run `{parse=dateTimeMs}`
    // on the value to convert it into epoch milliseconds — the unit the SDL
    // pipeline's reserved `timestamp` field expects.
    //
    // If a row ever ships without a `devTime` field, this format simply
    // doesn't match and the pipeline falls back to receive-time. If
    // dateTimeMs ever fails to recognize the format on a particular row, the
    // value lands as null on `event_time_ms` and the mappings.copy below is
    // a no-op for that row — no event is dropped (we deliberately do NOT
    // capture directly into the reserved `timestamp` field, which silently
    // drops events on a non-epoch input).
    {
      id: "devtime-anchor",
      format: ".*\\tdevTime=$event_time_ms=notTab{parse=dateTimeMs}$.*"
    }
  ],

  mappings: {
    version: 1,
    mappings: [
      // Always-on transformations: vendor-native → OCSF renames + casts.
      {
        predicate: "true",
        transformations: [
          // Endpoints
          { rename: { from: "src",            to: "src_endpoint.ip" } },
          { rename: { from: "dst",            to: "dst_endpoint.ip" } },
          { rename: { from: "srcPort",        to: "src_endpoint.port" } },
          { rename: { from: "dstPort",        to: "dst_endpoint.port" } },

          // NAT translations
          { rename: { from: "srcPostNAT",     to: "connection_info.src_translated.ip" } },
          { rename: { from: "dstPostNAT",     to: "connection_info.dst_translated.ip" } },
          { rename: { from: "srcPostNATPort", to: "connection_info.src_translated.port" } },
          { rename: { from: "dstPostNATPort", to: "connection_info.dst_translated.port" } },

          // Protocol — copy first, then cast original to int and the copy to
          // string-enum (1=ICMP, 6=TCP, 17=UDP, etc.). enum_default keeps
          // unmapped numbers tagged rather than left untouched (skill gotcha).
          { rename: { from: "proto", to: "connection_info.protocol_num" } },
          { copy:   { from: "connection_info.protocol_num",
                      to:   "connection_info.protocol_name" } },
          { cast:   { field: "connection_info.protocol_num", type: "int" } },
          { cast:   { field: "connection_info.protocol_name",
                      type: "enum",
                      enum: { "1": "ICMP", "6": "TCP", "17": "UDP",
                              "47": "GRE", "50": "ESP", "51": "AH",
                              "58": "ICMPv6" },
                      enum_default: "Unknown" } },

          // User / device / status
          { rename: { from: "usrName",  to: "actor.user.name" } },
          { rename: { from: "sender",   to: "device.name" } },
          { rename: { from: "msg",      to: "status_detail" } },
          { rename: { from: "sev",      to: "severity" } },

          // LEEF header → metadata. `event_code` is captured by the fallback
          // frame on every event; for events that ALSO matched a per-code
          // frame, `metadata.event_code` is already set via that frame's
          // attributes — the rename then overwrites it with the same string.
          // Idempotent.
          { rename: { from: "event_code",      to: "metadata.event_code" } },
          { rename: { from: "product_version", to: "metadata.product.version" } },

          // Cast numeric ports.
          { cast: { field: "src_endpoint.port",                       type: "int" } },
          { cast: { field: "dst_endpoint.port",                       type: "int" } },
          { cast: { field: "connection_info.src_translated.port",     type: "int" } },
          { cast: { field: "connection_info.dst_translated.port",     type: "int" } },
          { cast: { field: "severity",                                type: "int" } },

          // Drop the LEEF directive that tells us how to parse devTime — it's
          // not data; it's metadata about devTime's format.
          { drop: { field: "devTimeFormat" } },

          // Drop the bulk frame body capture — every useful field has been
          // pulled out by the K/V catch-all.
          { drop: { field: "leef_body" } },

          // Promote the parsed event-time-in-epoch-ms into both the SDL
          // pipeline's reserved `timestamp` field (so the event lands on the
          // correct second on dashboards / search) and the OCSF-canonical
          // `time` field (so PowerQuery / OCSF consumers see it where they
          // expect). `event_time_ms` is the safe staging name from format 3.
          { copy: { from: "event_time_ms", to: "timestamp" } },
          { copy: { from: "event_time_ms", to: "time"      } },
          { drop: { field: "event_time_ms" } },

          // Drop format-id sentinels (every `format` with an `id:` emits a
          // `<id>: 'true'` boolean-string field on events that matched it).
          { drop: { field: "frame-allowed" } },
          { drop: { field: "frame-closed" } },
          { drop: { field: "frame-closed-abn" } },
          { drop: { field: "frame-discarded" } },
          { drop: { field: "frame-http-url" } },
          { drop: { field: "frame-engine-login-failed" } },
          { drop: { field: "frame-engine-login-event" } },
          { drop: { field: "frame-bba-login-failed" } },
          { drop: { field: "frame-mgmt-login-failed" } },
          { drop: { field: "frame-fallback" } },
          { drop: { field: "leef-kv" } },
          { drop: { field: "devtime-anchor" } },

          // Drop unparseable LEEF version/vendor/product text — these are
          // already represented by the parser-root `attributes:` and the
          // metadata.product.* renames above.
          { drop: { field: "leef_version" } },
          { drop: { field: "leef_vendor" } },
          { drop: { field: "leef_product" } },

          // Drop the redundant `action` field — disposition / disposition_id
          // are set per-event-code below from the LEEF header itself, which
          // is the canonical source. (action=Allow|Permit|Discard mirrors
          // event_code on every sample row.)
          { drop: { field: "action" } }
        ]
      },

      // Activity / disposition stamping happens on the per-event-code frame
      // formats via their `attributes:` blocks (see formats[] above), NOT in
      // mapping-predicate fan-out — predicates evaluating on a field whose
      // value comes from a mapping op (e.g. event_code → metadata.event_code
      // rename) do not match, so the canonical pattern is to set those values
      // on the format itself. Reference: references/mappers.md §"Conditional
      // class assignment via per-format attributes".
    ]
  },

  // Drop the raw event text once we've pulled every field out. Comment this
  // out while iterating so the raw message stays available in Test Parser.
  discardAttributes: ["message"]
}
