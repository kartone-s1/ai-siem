// Varonis DatAdvantage — LEEF over syslog.
//

{
  timezone: "UTC",

  attributes: {
    // -- Required pipeline defaults (mandatory on every parser) --
    "metadata.version":    "1.0.4",
    "dataSource.category": "security",       // hardcoded constant — never another value
    "dataSource.name":     "Varonis DatAdvantage",
    "dataSource.vendor":   "Varonis",

    // -- Vendor / product metadata --
    "metadata.product.vendor_name": "Varonis",
    "metadata.product.name":        "DatAdvantage",
    "metadata.log_provider":        "DatAdvantage",

    // -- OCSF Security Finding (2001) — vendor alerts on file activity --
    "class_uid":     2001,
    "class_name":    "Security Finding",
    "category_uid":  2,
    "category_name": "Findings"
  },

  patterns: {
    // Classic-syslog timestamp ("Feb 22 11:00:47" or "Feb  4 17:48:32" — note
    // the double space when the day is a single digit).
    syslogTs: "[A-Z][a-z]{2}\\s+\\d{1,2}\\s+\\d{2}:\\d{2}:\\d{2}",

    // CEF/LEEF pipe-delimited header field — anything that isn't a pipe.
    // Required because the alert title is free-form text with spaces.
    notPipe:  "[^|]*",

    // No extension value pattern is needed at format-parse time — the format
    // engine only captures the LEEF header + a single bulk `extension` field.
    // Every Varonis sub-field is then sliced out of `extension` by the
    // `rewrites:` array on Format 1 (Java regex match-replace, applied per
    // captured field, no format-engine quirks).
  },

  formats: [
    // Single format. Captures the syslog wrapper + the 5 pipe-delimited LEEF
    // header fields, then bundles the entire key=value extension into a
    // single `extension` field. The `rewrites:` array below then slices each
    // Varonis sub-field out of `extension` via Java regex match-replace.
    //
    // Why this two-step approach instead of enumerating every field directly
    // in the format string?
    //
    //   - Enumerating ~32 fields with a lazy `.*?` value pattern: rejected
    //     by the SDL parser validator ("Dangling meta character *?").
    //   - Enumerating ~32 fields with `(?:[^ ]+(?: [^ ]+)*)?`: format
    //     compiles but fails to match — most likely the empty-value cases
    //     (Threshold_Value=, Email_Sender=, etc.) break the format chain
    //     somewhere along its 32-field length and the whole format is
    //     rejected, taking the syslog/LEEF frame captures down with it.
    //   - A repeating `$_=identifier$=$_=valueExt$` catch-all: lets valueExt
    //     slurp to end-of-line because the engine has no anchor after the
    //     last `$...$`, gluing every key=value pair after the first onto
    //     the first captured value.
    //
    // The rewrites approach (matches FortiGate marketplace) is independent
    // of all those format-engine quirks — each rewrite is a standalone
    // Java regex that runs after Format 1 has captured `extension`. Empty
    // captures, special chars, internal spaces, and missing fields all
    // degrade gracefully (rewrite is a no-op, output not set).
    //
    // Notes on reserved names:
    //   - `host` is reserved (set from the syslog upload header), so we
    //     capture into `syslog_host` instead.
    //   - We capture the syslog stamp into `ts_raw`, not `timestamp` —
    //     writing to the reserved `timestamp` has historically caused
    //     silent drops on some tenants. SDL receive-time is the event time,
    //     and the canonical vendor event time lives in `devTime`, which we
    //     promote to metadata.original_time in mappings.
    {
      id: "varonis-datadvantage-frame",
      format: "<$pri=digits$>$ts_raw=syslogTs$ $syslog_host$ $appname=identifier$ - $tag=identifier$: LEEF:$cef_version=notPipe$\\|$cef_vendor=notPipe$\\|$cef_product=notPipe$\\|$cef_product_version=notPipe$\\|$finding.title=notPipe$\\|$extension$",
      rewrites: [
        // Each rewrite extracts one Varonis sub-field from the `extension`
        // capture using a regex of the shape:
        //
        //   ^.*<FieldName>=([^ ]*(?: [^ ]+)*).*$
        //
        // The leading `.*` (greedy) backtracks to the unique `<FieldName>=`
        // marker. The capture group `[^ ]*(?: [^ ]+)*` matches an empty
        // value OR a sequence of non-space chunks separated by single
        // internal spaces — naturally bounded by Varonis's 4-space inter-
        // field delimiter. Trailing `.*` absorbs everything after.
        //
        // The whole regex matches the full `extension` string, so the
        // replace `$1` produces just the captured value.
        { input: "extension", output: "cat",                             match: "^.*cat=([^ ]*(?: [^ ]+)*).*$",                             replace: "$1" },
        { input: "extension", output: "devTime",                         match: "^.*devTime=([^ ]*(?: [^ ]+)*).*$",                         replace: "$1" },
        { input: "extension", output: "sev",                             match: "^.*sev=([^ ]*(?: [^ ]+)*).*$",                             replace: "$1" },
        { input: "extension", output: "src",                             match: "^.*src=([^ ]*(?: [^ ]+)*).*$",                             replace: "$1" },
        { input: "extension", output: "Device_Name",                     match: "^.*Device_Name=([^ ]*(?: [^ ]+)*).*$",                     replace: "$1" },
        { input: "extension", output: "usrName",                         match: "^.*usrName=([^ ]*(?: [^ ]+)*).*$",                         replace: "$1" },
        { input: "extension", output: "accountName",                     match: "^.*accountName=([^ ]*(?: [^ ]+)*).*$",                     replace: "$1" },
        { input: "extension", output: "domain",                          match: "^.*domain=([^ ]*(?: [^ ]+)*).*$",                          replace: "$1" },
        { input: "extension", output: "Event_Type",                      match: "^.*Event_Type=([^ ]*(?: [^ ]+)*).*$",                      replace: "$1" },
        { input: "extension", output: "Event_Type_ID",                   match: "^.*Event_Type_ID=([^ ]*(?: [^ ]+)*).*$",                   replace: "$1" },
        { input: "extension", output: "Event_Status",                    match: "^.*Event_Status=([^ ]*(?: [^ ]+)*).*$",                    replace: "$1" },
        { input: "extension", output: "Affected_Object",                 match: "^.*Affected_Object=([^ ]*(?: [^ ]+)*).*$",                 replace: "$1" },
        { input: "extension", output: "Event_File_Server_Domain",        match: "^.*Event_File_Server_Domain=([^ ]*(?: [^ ]+)*).*$",        replace: "$1" },
        { input: "extension", output: "Affected_Object_Path",            match: "^.*Affected_Object_Path=([^ ]*(?: [^ ]+)*).*$",            replace: "$1" },
        { input: "extension", output: "Event_Additional_Data",           match: "^.*Event_Additional_Data=([^ ]*(?: [^ ]+)*).*$",           replace: "$1" },
        { input: "extension", output: "Threshold_First_Timestamp",       match: "^.*Threshold_First_Timestamp=([^ ]*(?: [^ ]+)*).*$",       replace: "$1" },
        { input: "extension", output: "Account_of_Changed_Permissions", match: "^.*Account_of_Changed_Permissions=([^ ]*(?: [^ ]+)*).*$",  replace: "$1" },
        { input: "extension", output: "Permissions_Changes",             match: "^.*Permissions_Changes=([^ ]*(?: [^ ]+)*).*$",             replace: "$1" },
        { input: "extension", output: "Permissions_before_Change",       match: "^.*Permissions_before_Change=([^ ]*(?: [^ ]+)*).*$",       replace: "$1" },
        { input: "extension", output: "Permissions_after_Change",        match: "^.*Permissions_after_Change=([^ ]*(?: [^ ]+)*).*$",        replace: "$1" },
        { input: "extension", output: "Alert_Page_URL",                  match: "^.*Alert_Page_URL=([^ ]*(?: [^ ]+)*).*$",                  replace: "$1" },
        { input: "extension", output: "Alert_ID",                        match: "^.*Alert_ID=([^ ]*(?: [^ ]+)*).*$",                        replace: "$1" }
      ]
    }
  ],

  mappings: {
    version: 1,
    mappings: [
      {
        predicate: "true",
        transformations: [
          // -- Severity (OCSF int 0-6; Varonis `sev` is already 1..5) --
          { copy: { from: "sev", to: "severity" } },
          { cast: { field: "severity", type: "int" } },

          // -- Timestamps --
          // devTime = vendor event time as a `MMM dd yyyy HH:mm:ss` string.
          // Threshold_First_Timestamp = first time the alert's underlying threshold
          // condition was observed → first_seen_time on the finding.
          { rename: { from: "devTime",                   to: "metadata.original_time" } },
          { rename: { from: "Threshold_First_Timestamp", to: "finding.first_seen_time" } },

          // -- Source endpoint (the device that triggered the alert) --
          { rename: { from: "src",         to: "src_endpoint.ip" } },
          { rename: { from: "Device_Name", to: "src_endpoint.hostname" } },

          // -- Actor user (usrName carries "DOMAIN\User"; domain is its own field) --
          { rename: { from: "usrName",     to: "actor.user.name" } },
          { rename: { from: "accountName", to: "actor.user.uid" } },
          { rename: { from: "domain",      to: "actor.user.domain" } },

          // -- Vendor event-type → OCSF analytic on the finding --
          { rename: { from: "Event_Type",    to: "analytic.name" } },
          { rename: { from: "Event_Type_ID", to: "analytic.uid" } },
          { rename: { from: "Event_Status",  to: "status" } },

          // -- Affected file/folder --
          { rename: { from: "Affected_Object",          to: "file.name" } },
          { rename: { from: "Affected_Object_Path",     to: "file.path" } },
          // The Varonis-side server hosting the file — kept under unmapped because
          // there's no OCSF slot on Security Finding for the affected file's host.
          { rename: { from: "Event_File_Server_Domain", to: "unmapped.file.host" } },

          // -- Finding metadata --
          { rename: { from: "cat",                   to: "finding.types" } },
          { rename: { from: "Event_Additional_Data", to: "finding.desc" } },
          { rename: { from: "Alert_Page_URL",        to: "finding.src_url" } },
          { rename: { from: "Alert_ID",              to: "finding.uid" } },

          // -- Permission-change details: keep under unmapped.permissions.* --
          { rename: { from: "Account_of_Changed_Permissions", to: "unmapped.permissions.account" } },
          { rename: { from: "Permissions_Changes",            to: "unmapped.permissions.changes" } },
          { rename: { from: "Permissions_before_Change",      to: "unmapped.permissions.before" } },
          { rename: { from: "Permissions_after_Change",       to: "unmapped.permissions.after" } },

          // -- LEEF header parts to unmapped.cef.* (keep for forensics) --
          { rename: { from: "cef_version",         to: "unmapped.cef.version" } },
          { rename: { from: "cef_vendor",          to: "unmapped.cef.vendor" } },
          { rename: { from: "cef_product",         to: "unmapped.cef.product" } },
          { rename: { from: "cef_product_version", to: "unmapped.cef.product_version" } },

          // -- Drop noise: original sev (already copied), reserved/empty fields --
          { drop: { field: "sev" } },
          { drop: { field: "proto" } },                       // always "Syslog" — no signal
          { drop: { field: "devTimeFormat" } },               // always "MMM dd yyyy HH:mm:ss"
          { drop: { field: "Threshold_Value" } },             // always empty in samples
          { drop: { field: "Event_by_MailboxOwner" } },       // always empty in samples
          { drop: { field: "Email_Sender" } },
          { drop: { field: "Mailbox_Access_by_Owner" } },
          { drop: { field: "Email_Item" } },
          { drop: { field: "Email_Attachment_Name" } },
          { drop: { field: "Email_Recipients" } },
          { drop: { field: "Email_Date" } },

          // -- Drop the bulk extension capture (already sliced by rewrites) --
          { drop: { field: "extension" } },

          // -- Drop the format-id sentinel --
          // SDL emits `varonis-datadvantage-frame: true` whenever the format with
          // `id: "varonis-datadvantage-frame"` matches (so downstream formats /
          // mappings can predicate on it). Drop on the way out.
          { drop: { field: "varonis-datadvantage-frame" } }
        ]
      }
    ]
  },

  // Drop the raw event text once fields are extracted. Comment out while
  // iterating so the original line stays available for inspection.
  discardAttributes: ["message"]
}
