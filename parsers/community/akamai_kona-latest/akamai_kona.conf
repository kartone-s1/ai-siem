{
  // ===================================================================
  // Akamai Kona Site Defender — SIEM event parser
  //
  // Source shape: one JSON object per line, delivered by the Akamai SIEM
  // REST API or Data Stream. Each event represents one HTTP request
  // inspected by the WAF / App & API Protector. Outer keys:
  //   geo.*          → client geolocation
  //   httpMessage.*  → request + response metadata (epoch ts in `start`)
  //   identity.*     → TLS fingerprints
  //   attackData.*   → WAF rule that fired + applied action
  //
  // Target schema: OCSF HTTP Activity (4002) with detection / disposition
  // metadata layered on top. Capture everything into `unmapped.*` via
  // `gron`, then rename / cast / drop in a single v1 mappings block.
  // ===================================================================
  attributes: {
    // 4 mandatory pipeline defaults
    "metadata.version":             "1.0.2",
    "dataSource.category":          "security",
    "dataSource.name":              "Kona Site Defender",
    "dataSource.vendor":            "Akamai",
    // product / provider metadata
    "metadata.product.vendor_name": "Akamai",
    "metadata.product.name":        "Kona Site Defender",
    "metadata.log_provider":        "akamai_siem",
    // OCSF class
    "class_uid":                    4002,
    "class_name":                   "HTTP Activity",
    "category_uid":                 4,
    "category_name":                "Network Activity"
  },

  formats: [
    {
      // Capture the whole JSON body into unmapped.* (flat dotted keys).
      id:     "akamai_siem_json",
      format: "$unmapped.{parse=gron}$"
    }
  ],

  mappings: {
    version: 1,
    mappings: [
      {
        predicate: "true",
        transformations: [
          // --- Event time -----------------------------------------------------
          // httpMessage.start is epoch seconds, encoded as a string in the JSON.
          { copy: { from: "unmapped.httpMessage.start", to: "time" } },
          { cast: { field: "time", type: "int" } },

          // --- Source endpoint (clientIP + geo + ASN) -------------------------
          { rename: { from: "unmapped.attackData.clientIP", to: "src_endpoint.ip" } },
          { rename: { from: "unmapped.geo.city",            to: "src_endpoint.location.city" } },
          { rename: { from: "unmapped.geo.country",         to: "src_endpoint.location.country" } },
          { rename: { from: "unmapped.geo.regionCode",      to: "src_endpoint.location.region" } },
          { rename: { from: "unmapped.geo.continent",       to: "src_endpoint.location.continent" } },
          { rename: { from: "unmapped.geo.asn",             to: "src_endpoint.autonomous_system.number" } },
          { cast:   { field: "src_endpoint.autonomous_system.number", type: "int" } },

          // --- HTTP request ---------------------------------------------------
          { rename: { from: "unmapped.httpMessage.method",    to: "http_request.http_method" } },
          { rename: { from: "unmapped.httpMessage.host",      to: "http_request.url.hostname" } },
          { rename: { from: "unmapped.httpMessage.path",      to: "http_request.url.path" } },
          { rename: { from: "unmapped.httpMessage.query",     to: "http_request.url.query_string" } },
          { rename: { from: "unmapped.httpMessage.port",      to: "http_request.url.port" } },
          { cast:   { field: "http_request.url.port",         type: "int" } },
          { rename: { from: "unmapped.httpMessage.protocol",  to: "http_request.version" } },
          // Akamai sends "HTTP/1.1", "HTTP/2", "h2", "h3" verbatim. Collapse to
          // the OCSF numeric form so queries don't need to know vendor spellings.
          { cast: { field: "http_request.version", type: "enum",
                    enum: { "HTTP/1.0": "1.0",
                            "HTTP/1.1": "1.1",
                            "HTTP/2":   "2",
                            "h2":       "2",
                            "HTTP/3":   "3",
                            "h3":       "3" },
                    enum_default: "unknown" } },
          { rename: { from: "unmapped.httpMessage.requestId", to: "http_request.uid" } },

          // --- HTTP response --------------------------------------------------
          { rename: { from: "unmapped.httpMessage.status", to: "http_response.code" } },
          { cast:   { field: "http_response.code",         type: "int" } },
          { rename: { from: "unmapped.httpMessage.bytes",  to: "http_response.length" } },
          { cast:   { field: "http_response.length",       type: "int" } },

          // --- TLS ------------------------------------------------------------
          { rename: { from: "unmapped.httpMessage.tls",           to: "tls.version" } },
          { rename: { from: "unmapped.identity.tlsFingerprintV2", to: "tls.fingerprint.value" } },
          { rename: { from: "unmapped.identity.tlsFingerprintV3", to: "tls.fingerprint.alt_value" } },

          // --- activity_id / activity_name (HTTP method enum) -----------------
          { copy: { from: "http_request.http_method", to: "activity_id" } },
          { cast: { field: "activity_id", type: "enum",
                    enum: { "CONNECT": 1, "DELETE": 2, "GET": 3, "HEAD": 4,
                            "OPTIONS": 5, "POST": 6, "PUT": 7, "TRACE": 8 },
                    enum_default: 99 } },
          { copy: { from: "http_request.http_method", to: "activity_name" } },
          { cast: { field: "activity_name", type: "enum",
                    enum: { "CONNECT": "Connect", "DELETE": "Delete", "GET": "Get",
                            "HEAD": "Head", "OPTIONS": "Options", "POST": "Post",
                            "PUT": "Put", "TRACE": "Trace" },
                    enum_default: "Other" } },

          // --- Disposition (appliedAction: allow / alert / deny) --------------
          // OCSF disposition_id: 1 = Allowed, 2 = Blocked, 6 = Detected
          { copy: { from: "unmapped.attackData.appliedAction", to: "disposition_id" } },
          { cast: { field: "disposition_id", type: "enum",
                    enum: { "allow":   1,
                            "alert":   6,
                            "monitor": 6,
                            "deny":    2 },
                    enum_default: 99 } },
          { copy: { from: "unmapped.attackData.appliedAction", to: "disposition" } },
          { cast: { field: "disposition", type: "enum",
                    enum: { "allow":   "Allowed",
                            "alert":   "Detected",
                            "monitor": "Detected",
                            "deny":    "Blocked" },
                    enum_default: "Other" } },

          // --- Severity (driven off disposition) ------------------------------
          // deny  → severity_id 4 (High)
          // alert → severity_id 2 (Low)
          // allow → severity_id 1 (Informational)
          { constant: { value: 4, field: "severity_id",
                        predicate: "unmapped.attackData.appliedAction == 'deny'" } },
          { constant: { value: 2, field: "severity_id",
                        predicate: "unmapped.attackData.appliedAction == 'alert'" } },
          { constant: { value: 1, field: "severity_id",
                        predicate: "unmapped.attackData.appliedAction == 'allow'" } },
          { constant: { value: "High",          field: "severity_name",
                        predicate: "severity_id == 4" } },
          { constant: { value: "Low",           field: "severity_name",
                        predicate: "severity_id == 2" } },
          { constant: { value: "Informational", field: "severity_name",
                        predicate: "severity_id == 1" } },

          // --- WAF rule / detection metadata ----------------------------------
          // Akamai SIEM delivers these as scalar strings (the API used to
          // return arrays but the current schema flattens). Multiple rules
          // collapse to a single comma-/pipe-separated string upstream.
          { rename: { from: "unmapped.attackData.rules",        to: "finding.uid" } },
          { rename: { from: "unmapped.attackData.ruleMessages", to: "finding.title" } },
          { rename: { from: "unmapped.attackData.ruleTags",     to: "finding.types" } },
          { rename: { from: "unmapped.attackData.ruleData",     to: "finding.desc" } },
          { rename: { from: "unmapped.attackData.ruleSelectors", to: "finding.supporting_data.selector" } },
          { rename: { from: "unmapped.attackData.ruleVersions",  to: "finding.supporting_data.rule_version" } },
          { rename: { from: "unmapped.attackData.ruleActions",   to: "finding.supporting_data.rule_action" } },

          // --- Policy / config UID --------------------------------------------
          { rename: { from: "unmapped.attackData.policyId", to: "policy.uid" } },
          { rename: { from: "unmapped.attackData.configId", to: "metadata.correlation_uid" } },

          // --- Drop everything we didn't map ----------------------------------
          // The request/response header blobs are multi-line escaped strings;
          // they can be 5-10 KB each and add no analytic value at ingest time.
          // The `type` / `format` / `version` envelope keys are static.
          { drop_tree: { field: "unmapped" } },

          // The format `id: "akamai_siem_json"` auto-emits a sentinel field
          // `akamai_siem_json = true` on every matched event. We don't fan
          // mappings out by format id, so just drop the sentinel.
          { drop: { field: "akamai_siem_json" } }
        ]
      }
    ]
  },

  discardAttributes: ["message"]
}
